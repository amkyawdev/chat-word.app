<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Word - Loading</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .background-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s linear infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        .loader-container {
            text-align: center;
            max-width: 480px;
            padding: 50px 60px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }
        
        .logo {
            font-size: 72px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .logo-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        .logo-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 40px;
        }
        
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-right-color: #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 25px;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            width: 0%;
            transition: width 0.4s ease;
        }
        
        .status-text {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.05);
            transform: translateY(-2px);
        }
        
        .footer-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .footer-links a {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        
        .footer-links a:hover {
            color: #667eea;
        }
        
        .version {
            margin-top: 30px;
            color: #aaa;
            font-size: 12px;
        }
        
        .redirect-text {
            font-size: 13px;
            color: #888;
            margin-top: 20px;
        }
        
        .redirect-text span {
            color: #667eea;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="background-effects">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 2.5s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 1.5s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 4.5s;"></div>
    </div>
    
    <!-- Loader Container -->
    <div class="loader-container">
        <div class="logo">💬</div>
        <h1 class="logo-title">Chat Word</h1>
        <p class="logo-subtitle">Connecting People Worldwide</p>
        
        <div class="loader-ring"></div>
        <div class="loading-text">Loading...</div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        
        <p class="status-text" id="status-text">Initializing...</p>
        
        <p class="redirect-text" id="redirectText">Redirecting to register in <span id="countdown">15</span>s...</p>
        
        <div class="footer-links">
            <a href="pages/about.html">About</a>
            <a href="pages/setting.html">Settings</a>
        </div>
        
        <p class="version">Version 1.0.0 • Powered by Supabase</p>
    </div>
    
    <script>
        // Supabase credentials
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        let supabase = null;
        
        async function initSupabase() {
            try {
                if (typeof window.supabase !== 'undefined') {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    return true;
                }
            } catch (error) {
                console.error('Failed to initialize Supabase:', error);
            }
            return false;
        }
        
        async function checkAuthAndRedirect() {
            const progress = document.getElementById('progress');
            const status = document.getElementById('status-text');
            
            // Step 1: Load
            status.textContent = 'Loading resources...';
            progress.style.width = '25%';
            await new Promise(r => setTimeout(r, 400));
            
            // Step 2: Connect
            const initialized = await initSupabase();
            progress.style.width = '50%';
            status.textContent = initialized ? 'Connecting to database...' : 'Initializing...';
            await new Promise(r => setTimeout(r, 400));
            
            // Step 3: Check
            if (initialized && supabase) {
                const { data: { session } } = await supabase.auth.getSession();
                progress.style.width = '75%';
                status.textContent = 'Verifying session...';
                await new Promise(r => setTimeout(r, 300));
                
                if (session) {
                    progress.style.width = '100%';
                    status.textContent = 'Welcome back!';
                    await new Promise(r => setTimeout(r, 500));
                    window.location.href = 'pages/main.html';
                    return;
                }
            }
            
            // Step 4: Redirect to register after 15 seconds
            progress.style.width = '100%';
            status.textContent = 'Redirecting...';
            await new Promise(r => setTimeout(r, 300));
            
            // Start 15 second countdown to register page
            let seconds = 15;
            const countdownEl = document.getElementById('countdown');
            const redirectTextEl = document.getElementById('redirectText');
            
            const countdown = setInterval(() => {
                seconds--;
                countdownEl.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(countdown);
                    window.location.href = 'pages/auth/register.html';
                }
            }, 1000);
        }
        
        document.addEventListener('DOMContentLoaded', checkAuthAndRedirect);
    </script>
</body>
</html>
