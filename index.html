<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Word - Loading</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 50%, #E0F4FF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        
        .loader-container {
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            font-weight: 700;
            color: #1E90FF;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(135, 206, 235, 0.5);
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(135, 206, 235, 0.3);
            border-top: 5px solid #00BFFF;
            border-right: 5px solid #1E90FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #1E90FF;
            font-size: 18px;
            font-weight: 500;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .progress-bar {
            width: 200px;
            height: 6px;
            background: rgba(135, 206, 235, 0.3);
            border-radius: 3px;
            margin: 20px auto 0;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #87CEEB, #00BFFF, #1E90FF);
            background-size: 200% 100%;
            animation: shimmer 2s ease infinite;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        /* Floating clouds effect */
        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(8px);
            animation: floatCloud 20s linear infinite;
        }
        
        .cloud:nth-child(1) {
            width: 100px;
            height: 40px;
            top: 10%;
            left: -100px;
            animation-delay: 0s;
        }
        
        .cloud:nth-child(2) {
            width: 120px;
            height: 50px;
            top: 30%;
            left: -120px;
            animation-delay: 5s;
        }
        
        .cloud:nth-child(3) {
            width: 80px;
            height: 35px;
            top: 60%;
            left: -80px;
            animation-delay: 10s;
        }
        
        .cloud:nth-child(4) {
            width: 150px;
            height: 60px;
            top: 80%;
            left: -150px;
            animation-delay: 15s;
        }
        
        @keyframes floatCloud {
            0% {
                transform: translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateX(calc(100vw + 200px));
                opacity: 0;
            }
        }
        
        /* Version text */
        .version {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(30, 144, 255, 0.6);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Floating Clouds -->
    <div class="clouds">
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
        <div class="cloud"></div>
    </div>
    
    <!-- Loader Container -->
    <div class="loader-container">
        <div class="logo">💬 Chat Word</div>
        <div class="loader"></div>
        <div class="loading-text">Loading...</div>
        <div class="progress-bar">
            <div class="progress-bar-fill" id="progress"></div>
        </div>
    </div>
    
    <div class="version">v1.0.0</div>
    
    <script>
        // Simulate loading progress
        let progress = 0;
        const progressBar = document.getElementById('progress');
        
        const loadingInterval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress > 100) progress = 100;
            progressBar.style.width = progress + '%';
            
            if (progress === 100) {
                clearInterval(loadingInterval);
                setTimeout(() => {
                    // Redirect to main page
                    window.location.href = 'pages/main.html';
                }, 500);
            }
        }, 300);
        
        // Keyboard shortcut to skip loading (for testing)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                progress = 100;
                progressBar.style.width = '100%';
                clearInterval(loadingInterval);
                setTimeout(() => {
                    window.location.href = 'pages/main.html';
                }, 300);
            }
        });
    </script>
</body>
</html>
