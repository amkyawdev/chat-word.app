<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Word - Login</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 50%, #E0F4FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(135, 206, 235, 0.6);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .auth-title {
            color: #1E90FF;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            color: #1E90FF;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(135, 206, 235, 0.3);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }
        .form-input:focus {
            outline: none;
            border-color: #1E90FF;
            box-shadow: 0 0 0 4px rgba(0, 191, 255, 0.15);
        }
        .form-input.error {
            border-color: #ef4444;
        }
        .error-text {
            color: #ef4444;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        .error-text.show {
            display: block;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00BFFF, #1E90FF);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0, 191, 255, 0.4);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 191, 255, 0.5);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .auth-links {
            text-align: center;
            margin-top: 24px;
        }
        .auth-link {
            color: #1E90FF;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .auth-link:hover {
            text-decoration: underline;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #999;
            font-size: 13px;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E0F4FF;
        }
        .auth-divider span {
            padding: 0 15px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover {
            color: #1E90FF;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .alert.error {
            background: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }
        .alert.success {
            background: #f0fdf4;
            color: #22c55e;
            border: 1px solid #bbf7d0;
        }
        .alert.show {
            display: block;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">💬</div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to continue to Chat Word</p>
            </div>
            
            <div class="alert" id="alertBox"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email" 
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                    <p class="error-text" id="emailError">Please enter a valid email</p>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        id="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                    <p class="error-text" id="passwordError">Password is required</p>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div class="auth-links">
                <a href="reset.html" class="auth-link">Forgot Password?</a>
            </div>
            
            <div class="auth-divider"><span>or</span></div>
            
            <div class="auth-links">
                <p style="color: #666; font-size: 14px;">
                    Don't have an account? 
                    <a href="register.html" class="auth-link">Sign Up</a>
                </p>
            </div>
            
            <a href="../../index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        // Supabase credentials
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check if already logged in
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = '../main.html';
            }
        }
        checkAuth();
        
        // Form elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const alertBox = document.getElementById('alertBox');
        
        // Show alert
        function showAlert(message, type = 'error') {
            alertBox.textContent = message;
            alertBox.className = `alert ${type} show`;
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 5000);
        }
        
        // Login handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            // Validation
            if (!email || !password) {
                showAlert('Please fill in all fields');
                return;
            }
            
            // Show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Signing in...';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                showAlert('Login successful! Redirecting...', 'success');
                
                // Redirect to main page
                setTimeout(() => {
                    window.location.href = '../main.html';
                }, 1000);
                
            } catch (error) {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                showAlert(error.message || 'Login failed. Please check your credentials.');
            }
        });
    </script>
</body>
</html>
